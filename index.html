<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
            color: white;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.5em;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
        }

        .score {
            flex: 1;
        }

        .divider {
            color: #fff;
            margin: 0 30px;
        }

        #gameCanvas {
            display: block;
            background-color: #000;
            border: 3px solid #fff;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.9em;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            line-height: 1.6;
        }

        .instructions h3 {
            margin-bottom: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 30px;
            font-size: 1em;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        
        <div class="game-info">
            <div class="score">
                <div>Player (Left)</div>
                <div id="playerScore">0</div>
            </div>
            <div class="divider">|</div>
            <div class="score">
                <div>Computer (Right)</div>
                <div id="computerScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="instructions">
            <h3>🎮 Controls:</h3>
            <p>🖱️ <strong>Mouse Y Position:</strong> Move your paddle up/down</p>
            <p>⬆️ ⬇️ <strong>Arrow Keys:</strong> Alternative control method</p>
            <p><strong>First to 5 points wins!</strong></p>
            <button onclick="resetGame()">Reset Game</button>
        </div>
    </div>

    <script>
        // Canvas and Context
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 8;

        // Player Paddle (Left)
        const playerPaddle = {
            x: 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6
        };

        // Computer Paddle (Right)
        const computerPaddle = {
            x: canvas.width - 30,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: 4.5
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            radius: ballSize,
            speed: 5
        };

        // Score
        let playerScore = 0;
        let computerScore = 0;

        // Keyboard input
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Mouse input
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            playerPaddle.y = mouseY - paddleHeight / 2;
        });

        // Update game state
        function update() {
            // Player paddle movement with arrow keys
            if (keys['ArrowUp']) {
                playerPaddle.y -= playerPaddle.speed;
            }
            if (keys['ArrowDown']) {
                playerPaddle.y += playerPaddle.speed;
            }

            // Keep player paddle in bounds
            playerPaddle.y = Math.max(0, Math.min(canvas.height - playerPaddle.height, playerPaddle.y));

            // Computer AI - follows the ball
            const computerCenter = computerPaddle.y + computerPaddle.height / 2;
            const ballCenter = ball.y;
            
            if (computerCenter < ballCenter - 15) {
                computerPaddle.y += computerPaddle.speed;
            } else if (computerCenter > ballCenter + 15) {
                computerPaddle.y -= computerPaddle.speed;
            }

            // Keep computer paddle in bounds
            computerPaddle.y = Math.max(0, Math.min(canvas.height - computerPaddle.height, computerPaddle.y));

            // Update ball position
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.radius, Math.min(canvas.height - ball.radius, ball.y));
            }

            // Ball collision with paddles
            if (
                ball.x - ball.radius < playerPaddle.x + playerPaddle.width &&
                ball.y > playerPaddle.y &&
                ball.y < playerPaddle.y + playerPaddle.height
            ) {
                ball.dx = -ball.dx;
                ball.x = playerPaddle.x + playerPaddle.width + ball.radius;
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (playerPaddle.y + playerPaddle.height / 2)) / (playerPaddle.height / 2);
                ball.dy = hitPos * ball.speed;
                ball.dx = Math.abs(ball.dx); // Ensure ball moves right
            }

            if (
                ball.x + ball.radius > computerPaddle.x &&
                ball.y > computerPaddle.y &&
                ball.y < computerPaddle.y + computerPaddle.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computerPaddle.x - ball.radius;
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (computerPaddle.y + computerPaddle.height / 2)) / (computerPaddle.height / 2);
                ball.dy = hitPos * ball.speed;
                ball.dx = -Math.abs(ball.dx); // Ensure ball moves left
            }

            // Score detection (ball out of bounds)
            if (ball.x < 0) {
                computerScore++;
                resetBall();
            }
            if (ball.x > canvas.width) {
                playerScore++;
                resetBall();
            }

            // Update score display
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = (Math.random() - 0.5) * ball.speed;
        }

        // Draw functions
        function drawRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
        }

        function drawCircle(x, y, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCenterLine() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function draw() {
            // Clear canvas
            drawRect(0, 0, canvas.width, canvas.height, '#000');

            // Draw center line
            drawCenterLine();

            // Draw paddles
            drawRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height, '#00FF00');
            drawRect(computerPaddle.x, computerPaddle.y, computerPaddle.width, computerPaddle.height, '#FF0000');

            // Draw ball
            drawCircle(ball.x, ball.y, ball.radius, '#FFFF00');
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Reset game
        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
            resetBall();
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
